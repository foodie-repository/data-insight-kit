<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>data-insight-kit dashboard</title>
<!--
  데이터 주입형 대시보드 템플릿 (data-insight-kit).
  렌더러는 아래 <script id="dashboard-data"> 의 JSON만 읽어 순수 SVG로 그린다.
  visualize 에이전트는 그 블록의 내용을 run의 dashboard_data.json 으로 교체한다.
  CDN 차트 라이브러리 없음 · 이모지 없음 · 색은 role→테마 매핑.
-->
<style>
  :root {
    --bg:#edf3f7; --card:#ffffff; --ink:#303447; --muted:#697386; --soft:#8b96a7;
    --grid:rgba(48,52,71,0.09); --axis:rgba(48,52,71,0.24);
    --good:#35a56f; --bad:#d96a73; --warn:#d89b38; --neutral:#707886; --info:#3478f6;
    --cat1:#3478f6; --cat2:#74a9d8; --cat3:#d96a73; --cat4:#35a56f;
    --cat5:#bb69d6; --cat6:#f39a7d; --cat7:#6f8d9f; --cat8:#9a9a9a;
    --radius:12px; --shadow:none; --page-max:1080px; --card-pad-y:16px; --card-pad-x:18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--ink); padding:32px 36px 72px;
    transition:background .25s,color .25s; line-height:1.5;
  }
  body.profile-executive_brief { padding-top:34px; }
  body.profile-analyst_workspace { padding:22px 24px 56px; }
  body.profile-operations_monitor { padding:28px 32px 64px; }
  .wrap { max-width:var(--page-max); margin:0 auto; position:relative; }
  .topbar { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:8px; }
  .title { font-family:Georgia,'Times New Roman',serif; font-size:30px; font-weight:600; letter-spacing:-.01em; }
  .meta-line { font-size:12px; color:var(--muted); margin-top:6px; }
  .theme-btn {
    border:1px solid var(--axis); background:transparent; color:var(--ink);
    border-radius:8px; padding:7px 13px; font-size:12px; cursor:pointer; white-space:nowrap;
  }
  .theme-btn:hover { border-color:var(--ink); }

  .tabs { display:flex; gap:6px; margin:22px 0 18px; flex-wrap:wrap; }
  .tab { border:1px solid var(--grid); background:var(--card); color:var(--muted);
    border-radius:9px; padding:9px 15px; font-size:13px; cursor:pointer; }
  .tab.active { color:var(--ink); border-color:var(--axis); font-weight:600; }
  .panel { display:none; } .panel.active { display:block; }

  .ptitle { font-family:Georgia,serif; font-size:21px; font-weight:600; margin:6px 0 2px; }
  .pmethod { font-size:12px; color:var(--soft); margin-bottom:18px; }

  /* 비대칭 스토리 4칸 */
  .story { display:grid; grid-template-columns:1.4fr 1fr 1fr 1.1fr; gap:1px; background:var(--grid);
    border:1px solid var(--grid); border-radius:var(--radius); overflow:hidden; margin-bottom:22px; box-shadow:var(--shadow); }
  .sf { background:var(--card); padding:15px 16px; }
  .sf-l { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--soft); margin-bottom:7px; }
  .sf-v { font-family:Georgia,serif; font-size:19px; font-weight:600; }
  .sf-d { font-size:11.5px; color:var(--muted); margin-top:3px; }

  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
  .kpi { background:var(--card); border:1px solid var(--grid); border-radius:var(--radius); padding:15px 16px; box-shadow:var(--shadow); }
  .kpi-l { font-size:11.5px; color:var(--muted); margin-bottom:9px; min-height:30px; }
  .kpi-v { font-size:25px; font-weight:600; letter-spacing:-.01em; color:var(--ink); }
  .kpi-u { font-size:13px; color:var(--soft); margin-left:2px; font-weight:400; }
  .kpi-d { font-size:11.5px; margin-top:6px; }
  .kpi-den { font-size:10.5px; color:var(--soft); margin-top:4px; }
  .kpi-spark { margin-top:7px; }
  .kpi-spark svg { width:100%; max-width:140px; height:40px; margin:0; display:block; }
  .kpi-spark-l { font-size:10px; color:var(--soft); margin-top:2px; }
  /* v4 opt-in 레이아웃 (meta.dashboard_profile_contract=="v4"일 때만 생성됨) */
  .v4-scroll .v4-primary { display:block; margin-bottom:22px; }
  .v4-demoted { margin-top:14px; border:1px solid var(--grid); border-radius:var(--radius);
    background:var(--card); padding:10px 14px; }
  .v4-demoted summary { cursor:pointer; font-size:13px; color:var(--muted); }
  .v4-demoted[open] summary { margin-bottom:10px; }
  .v4-ops { display:grid; grid-template-columns:172px 1fr; gap:16px; align-items:start; }
  .v4-rail { display:flex; flex-direction:column; gap:6px; position:sticky; top:12px; }
  .rail-item { padding:9px 12px; border:1px solid var(--grid); border-radius:8px;
    background:var(--card); color:var(--muted); font-size:12.5px; cursor:pointer; }
  .rail-item.active { color:var(--ink); border-color:var(--info); font-weight:600; }
  @media (max-width: 860px) {
    .v4-ops { grid-template-columns:1fr; }
    .v4-rail { flex-direction:row; overflow-x:auto; position:static; } /* 좁은 화면: 레일→상단 탭 강등 */
  }
  .sm-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:10px; margin-bottom:16px; }
  .sm-grid .sm-card { min-height:0; }
  .sm-grid svg { width:100%; }
  .dt td.grad-cell { font-variant-numeric:tabular-nums; }
  .badge { display:inline-block; font-size:10px; padding:1px 6px; border-radius:5px; margin-left:6px;
    background:var(--warn); color:#fff; }

  /* 비대칭 차트 그리드 */
  .charts { display:grid; gap:14px; margin-bottom:8px; }
  .row-2a { grid-template-columns:1.5fr 1fr; }
  .row-3 { grid-template-columns:repeat(3,1fr); }
  .row-1 { grid-template-columns:1fr; }
  .charts.secondary { margin-top:14px; opacity:.96; }
  .card { background:var(--card); border:1px solid var(--grid); border-radius:var(--radius); padding:var(--card-pad-y) var(--card-pad-x);
    display:flex; flex-direction:column; box-shadow:var(--shadow); }
  .cc-t { font-size:14px; font-weight:700; }
  .cc-d { font-size:11.5px; color:var(--muted); margin:2px 0 4px; }
  svg { width:min(100%, 632px); height:auto; margin:6px auto 0; display:block; overflow:visible; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; font-size:11px; color:var(--muted); }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:middle; }

  .sim { background:var(--card); border:1px solid var(--axis); border-radius:var(--radius); padding:18px 20px; margin:14px 0; box-shadow:var(--shadow); }
  .sim-t { font-size:13px; font-weight:700; margin-bottom:14px; }
  .sim-row { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
  .sim-row label { font-size:12px; color:var(--muted); width:130px; }
  .sim-row input[type=range] { flex:1; accent-color:var(--info); }
  .sim-iv { font-family:monospace; font-size:12px; width:64px; text-align:right; }
  .sim-out { margin-top:8px; font-size:13px; color:var(--muted); }
  .sim-out b { font-family:Georgia,serif; font-size:22px; color:var(--ink); margin-left:6px; }

  .actions { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px; }
  .act { background:var(--card); border:1px solid var(--grid); border-radius:var(--radius); padding:14px 15px; box-shadow:var(--shadow); }
  .act-p { font-size:10px; font-weight:700; letter-spacing:.06em; color:var(--info); margin-bottom:6px; }
  .act-t { font-size:13px; font-weight:600; margin-bottom:4px; }
  .act-w { font-size:11.5px; color:var(--muted); }

  table.dt { width:100%; border-collapse:collapse; margin-top:8px; font-size:12.5px; }
  table.dt th, table.dt td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--grid); }
  table.dt th { color:var(--muted); font-weight:600; font-size:11px; }

  body.profile-executive_brief .title { font-size:32px; }
  body.profile-executive_brief .kpis { grid-template-columns:repeat(4,1fr); }
  body.profile-executive_brief .kpi-v { font-size:27px; }
  body.profile-executive_brief .ptitle { font-size:22px; }
  .exec-hero { display:grid; grid-template-columns:minmax(0,1.62fr) minmax(280px,.88fr); gap:14px; align-items:stretch; margin-bottom:8px; }
  .exec-main .card { height:100%; min-height:310px; }
  .exec-main svg { width:min(100%,720px); }
  .exec-side { display:grid; gap:12px; align-content:start; }
  .exec-side .story { grid-template-columns:1fr; margin-bottom:0; }
  .exec-side .sf { padding:12px 13px; }
  .exec-side .sf-v { font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif; font-size:15px; line-height:1.35; }
  .exec-side .support-card svg { width:min(100%,340px); }

  body.profile-analyst_workspace .wrap { max-width:var(--page-max); }
  body.profile-analyst_workspace .title { font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif; font-size:24px; letter-spacing:0; }
  body.profile-analyst_workspace .tabs { margin:14px 0 12px; }
  body.profile-analyst_workspace .tab { border-radius:6px; padding:7px 11px; font-size:12px; }
  body.profile-analyst_workspace .kpis { grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:14px; }
  body.profile-analyst_workspace .kpi { padding:11px 12px; }
  body.profile-analyst_workspace .kpi-l { min-height:24px; font-size:10.5px; margin-bottom:6px; }
  body.profile-analyst_workspace .kpi-v { font-size:21px; }
  body.profile-analyst_workspace .charts { gap:10px; }
  body.profile-analyst_workspace .card { --card-pad-y:12px; --card-pad-x:13px; }
  body.profile-analyst_workspace .cc-t { font-size:13px; }
  body.profile-analyst_workspace .cc-d { font-size:10.8px; }
  .analyst-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:10px; margin-bottom:8px; }
  .analyst-grid .card { grid-column:span 4; min-height:260px; }
  .analyst-grid .chart-type-line,
  .analyst-grid .chart-type-area,
  .analyst-grid .chart-type-scatter,
  .analyst-grid .chart-type-heatmap,
  .analyst-grid .chart-type-boxplot { grid-column:span 6; }
  .analyst-grid .chart-type-stacked_bar,
  .analyst-grid .chart-type-waterfall,
  .analyst-grid .chart-type-slope { grid-column:span 6; }
  .analyst-grid svg { width:min(100%,440px); }

  body.profile-operations_monitor .wrap { max-width:var(--page-max); padding-left:92px; }
  body.profile-operations_monitor .wrap::before {
    content:""; position:absolute; left:0; top:4px; width:70px; min-height:620px;
    border-radius:26px; background:var(--info); color:#fff; display:flex; justify-content:center;
    padding-top:30px; font-weight:700; letter-spacing:.08em; box-shadow:0 16px 34px rgba(30,68,112,.18);
  }
  /* v4 계약 run: 실제 레일(.v4-rail)이 있으므로 장식용 가짜 레일 제거 */
  body.v4-contract.profile-operations_monitor .wrap { padding-left:0; }
  body.v4-contract.profile-operations_monitor .wrap::before { display:none; }
  body.profile-operations_monitor .topbar { align-items:center; }
  body.profile-operations_monitor .title { font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans KR',sans-serif; font-size:27px; letter-spacing:0; }
  body.profile-operations_monitor .tabs { margin:18px 0 14px; }
  body.profile-operations_monitor .tab { border-radius:999px; padding:7px 15px; }
  body.profile-operations_monitor .kpis { grid-template-columns:repeat(4,1fr); }
  body.profile-operations_monitor .story { grid-template-columns:repeat(4,1fr); }
  .ops-layout { display:grid; grid-template-columns:minmax(270px,.82fr) minmax(0,1.48fr); gap:14px; align-items:start; }
  .ops-status-stack { display:grid; gap:12px; align-content:start; min-width:0; }
  /* v4 발견: 위 body.profile-operations_monitor .kpis/.story(4열) 규칙이 특이도로 이겨
     스택이 4열 강제 → E1 스파크(140px)와 결합해 grid blowout. body 접두로 특이도 교정 +
     minmax(0,1fr)로 축소 허용. */
  body.profile-operations_monitor .ops-status-stack .kpis { grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-bottom:0; }
  .ops-status-stack .kpi { padding:13px 14px; min-width:0; }
  .ops-status-stack .kpi-v { font-size:23px; }
  body.profile-operations_monitor .ops-status-stack .story { grid-template-columns:1fr; margin-bottom:0; }
  body.profile-operations_monitor .ops-status-stack .actions { grid-template-columns:1fr; margin-top:0; }
  .ops-trend-stack { display:grid; gap:14px; }
  .ops-trend-stack .charts { margin-bottom:0; }
  .ops-trend-stack .row-2a { grid-template-columns:1fr 1fr; }

  @media (max-width:820px){
    body{padding:22px 18px 48px;}
    body.profile-operations_monitor .wrap{padding-left:0;}
    body.profile-operations_monitor .wrap::before{display:none;}
    .kpis, body.profile-analyst_workspace .kpis, body.profile-executive_brief .kpis, body.profile-operations_monitor .kpis{grid-template-columns:1fr 1fr;}
    .story,.charts.row-2a,.charts.row-3,.actions, body.profile-operations_monitor .story,
    .exec-hero,.analyst-grid,.ops-layout{grid-template-columns:1fr;}
    .analyst-grid .card,
    .analyst-grid .chart-type-line,
    .analyst-grid .chart-type-area,
    .analyst-grid .chart-type-scatter,
    .analyst-grid .chart-type-heatmap,
    .analyst-grid .chart-type-boxplot,
    .analyst-grid .chart-type-stacked_bar,
    .analyst-grid .chart-type-waterfall,
    .analyst-grid .chart-type-slope{grid-column:span 1;}
    svg{width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="title" id="d-title"></div>
      <div class="meta-line" id="d-meta"></div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">다크 모드</button>
  </div>
  <div class="tabs" id="d-tabs"></div>
  <div id="d-panels"></div>
</div>

<!-- ▼ 데이터 주입 지점: visualize 에이전트가 이 블록 내용을 run의 dashboard_data.json 으로 교체 ▼ -->
<script id="dashboard-data" type="application/json">
{PLACE_DASHBOARD_DATA_HERE}
</script>
<!-- ▲ 데이터 주입 지점 ▲ -->

<script>
const THEMES = {
  light: {bg:"#edf3f7",card:"#ffffff",ink:"#303447",muted:"#697386",soft:"#8b96a7",grid:"rgba(48,52,71,0.09)",axis:"rgba(48,52,71,0.24)",good:"#35a56f",bad:"#d96a73",warn:"#d89b38",neutral:"#707886",info:"#3478f6",cat1:"#3478f6",cat2:"#74a9d8",cat3:"#d96a73",cat4:"#35a56f",cat5:"#bb69d6",cat6:"#f39a7d",cat7:"#6f8d9f",cat8:"#9a9a9a",radius:"12px",shadow:"none",pageMax:"1080px",cardPadY:"16px",cardPadX:"18px"},
  dark:  {bg:"#151923",card:"#202636",ink:"#f3f7fb",muted:"#aab4c3",soft:"#6f7b8c",grid:"rgba(243,247,251,0.10)",axis:"rgba(243,247,251,0.28)",good:"#48bf8a",bad:"#eb7f87",warn:"#e8b24c",neutral:"#c0c8d2",info:"#83aefb",cat1:"#83aefb",cat2:"#74c0d8",cat3:"#eb7f87",cat4:"#48bf8a",cat5:"#ce82e8",cat6:"#f7a58b",cat7:"#9db2c4",cat8:"#b5b5b5",radius:"12px",shadow:"none",pageMax:"1080px",cardPadY:"16px",cardPadX:"18px"}
};
const DASHBOARD_PROFILES = new Set(["executive_brief","analyst_workspace","operations_monitor"]);
const AUDIENCE_LABELS = {executive:"요약 검토",operator:"운영 검토",analyst:"분석 검토",mixed:"검토용"};
const PROFILE_THEMES = {
  light: {
    executive_brief: {bg:"#edf3f7",card:"#ffffff",ink:"#303447",muted:"#697386",soft:"#8b96a7",grid:"rgba(48,52,71,0.09)",axis:"rgba(48,52,71,0.24)",info:"#3478f6",cat1:"#3478f6",cat2:"#74a9d8",cat3:"#d96a73",cat4:"#35a56f",radius:"14px",shadow:"0 8px 22px rgba(40,55,75,.06)",pageMax:"1120px"},
    analyst_workspace: {bg:"#f4f6f8",card:"#ffffff",ink:"#252b36",muted:"#606b78",soft:"#8b96a3",grid:"rgba(37,43,54,0.10)",axis:"rgba(37,43,54,0.26)",info:"#2080a5",cat1:"#2080a5",cat2:"#e39aa6",cat3:"#bfc6cd",cat4:"#3f8d8d",radius:"8px",shadow:"none",pageMax:"1240px",cardPadY:"12px",cardPadX:"13px"},
    operations_monitor: {bg:"#e8f2f7",card:"#fbfdff",ink:"#283044",muted:"#647286",soft:"#8b9aae",grid:"rgba(40,48,68,0.10)",axis:"rgba(40,48,68,0.26)",info:"#4f73aa",cat1:"#4f73aa",cat2:"#e9899b",cat3:"#b5c9d9",cat4:"#6bc3b4",radius:"18px",shadow:"0 12px 30px rgba(37,70,100,.10)",pageMax:"1180px"}
  },
  dark: {
    executive_brief: {bg:"#151923",card:"#202636",ink:"#f3f7fb",muted:"#aab4c3",soft:"#6f7b8c",grid:"rgba(243,247,251,0.10)",axis:"rgba(243,247,251,0.28)",info:"#83aefb",cat1:"#83aefb",cat2:"#74c0d8",cat3:"#eb7f87",cat4:"#48bf8a",radius:"14px",shadow:"none",pageMax:"1120px"},
    analyst_workspace: {bg:"#111820",card:"#1a222c",ink:"#f0f4f8",muted:"#a0acb9",soft:"#687585",grid:"rgba(240,244,248,0.11)",axis:"rgba(240,244,248,0.28)",info:"#4aa7c9",cat1:"#4aa7c9",cat2:"#e59daa",cat3:"#9ca8b3",cat4:"#5ab6aa",radius:"8px",shadow:"none",pageMax:"1240px",cardPadY:"12px",cardPadX:"13px"},
    operations_monitor: {bg:"#111827",card:"#1d2635",ink:"#f6f8fb",muted:"#a9b5c4",soft:"#718197",grid:"rgba(246,248,251,0.10)",axis:"rgba(246,248,251,0.28)",info:"#7aa2df",cat1:"#7aa2df",cat2:"#e8899a",cat3:"#93b9d2",cat4:"#70c7b9",radius:"18px",shadow:"none",pageMax:"1180px"}
  }
};
let THEME = "light";
function cssVarName(k){ return k.replace(/[A-Z]/g, m=>"-"+m.toLowerCase()); }
function setVars(vars){ for(const k in vars) document.documentElement.style.setProperty("--"+cssVarName(k), vars[k]); }
function dashboardProfile(){ const p=(DATA.meta&&DATA.meta.dashboard_profile)||"executive_brief"; return DASHBOARD_PROFILES.has(p)?p:"executive_brief"; }
function applyProfileClass(){
  const p=dashboardProfile();
  document.body.classList.remove("profile-executive_brief","profile-analyst_workspace","profile-operations_monitor");
  document.body.classList.add("profile-"+p);
  return p;
}
function applyTheme(n){ const profile=applyProfileClass(); setVars(THEMES[n]); setVars((PROFILE_THEMES[n]||{})[profile]||{}); THEME=n;
  document.getElementById("theme-btn").textContent = n==="light"?"다크 모드":"라이트 모드"; render(); }
function toggleTheme(){ applyTheme(THEME==="light"?"dark":"light"); }
function rc(role){ return getComputedStyle(document.documentElement).getPropertyValue("--"+(role||"info")).trim(); }

const DATA = JSON.parse(document.getElementById("dashboard-data").textContent);

// value는 항상 표시 준비된 값. display_scale은 v2 재현용 메타데이터(렌더러 재나눗셈 안 함).
function fmt(v, f){ if(v===null||v===undefined) return "—"; if(typeof v!=="number") return v;
  const p = (f&&f.precision!=null)? f.precision : (Number.isInteger(v)?0:1);
  return v.toFixed(p); }
function trim(n){ return Number.isInteger(n)? n : (Math.round(n*100)/100); }
function esc(v){ return String(v).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function clipLabel(v, max=10){ const chars=[...String(v)]; return chars.length>max?chars.slice(0,Math.max(1,max-1)).join("")+"…":chars.join(""); }
function labelWeight(v){ return [...String(v)].reduce((n,ch)=>n+(ch.charCodeAt(0)>127?1.55:0.85),0); }
function labelStep(xs, maxShown=7){ return Math.max(1, Math.ceil((xs||[]).length/maxShown)); }
function denseLabels(xs){ return (xs||[]).length>7 || (xs||[]).some(x=>labelWeight(x)>10) || (xs||[]).reduce((a,x)=>a+labelWeight(x),0)>44; }
function labelText(v, max=10){ return esc(clipLabel(v,max)); }

/* ───── 시뮬레이터 모델 계산 (JS·Python 동일 규약) ───── */
function computeModel(model, inputs, vals){
  const get=(id)=>{ const inp=inputs.find(i=>i.id===id); let v=vals[id]; return model.input_basis==="delta_from_default"? v-(inp?inp.default:0): v; };
  let out;
  if(model.type==="linear"){ out=model.base; for(const t of model.terms) out+=t.coefficient*get(t.input); }
  else if(model.type==="percentage"){ let s=0; for(const t of model.terms) s+=t.pct_per_unit*get(t.input); out=model.base*(1+s/100); }
  else if(model.type==="lookup"){ const x=vals[model.input]; const tb=model.table;
    if(x<=tb[0].in) out= x<tb[0].in && model.out_of_range==="error"? NaN: tb[0].out;
    else if(x>=tb[tb.length-1].in) out= x>tb[tb.length-1].in && model.out_of_range==="error"? NaN: tb[tb.length-1].out;
    else { for(let i=0;i<tb.length-1;i++){ if(x>=tb[i].in&&x<=tb[i+1].in){ const r=(x-tb[i].in)/(tb[i+1].in-tb[i].in); out=tb[i].out+r*(tb[i+1].out-tb[i].out); break; } } } }
  if(model.rounding!=null && !isNaN(out)) out=Math.round(out*10**model.rounding)/10**model.rounding;
  return out;
}

/* ───── SVG 차트 (순수, CDN 없음) ───── */
const W=360,H=205,M={l:48,r:16,t:14,b:30};
const PW=W-M.l-M.r, PH=H-M.t-M.b;
function svgOpen(){ return `<svg viewBox="0 0 ${W} ${H}" role="img">`; }
function axes(){ return `<line x1="${M.l}" y1="${M.t}" x2="${M.l}" y2="${M.t+PH}" stroke="${rc('axis')}" stroke-width="1"/>`+
  `<line x1="${M.l}" y1="${M.t+PH}" x2="${M.l+PW}" y2="${M.t+PH}" stroke="${rc('axis')}" stroke-width="1"/>`; }
function yticks(min,max){ let s=""; for(let i=0;i<=3;i++){ const v=min+(max-min)*i/3; const y=M.t+PH-(PH*i/3);
  s+=`<line x1="${M.l}" y1="${y}" x2="${M.l+PW}" y2="${y}" stroke="${rc('grid')}" stroke-width="1"/>`+
     `<text x="${M.l-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${rc('muted')}">${trim(v)}</text>`; } return s; }

function renderLine(enc, asArea=false){
  const xs=enc.x.values, series=enc.series;
  const nums=series.flatMap(se=>se.values.filter(v=>v!==null));
  let mn=Math.min(...nums), mx=Math.max(...nums);
  if(enc.__domain){ mn=enc.__domain[0]; mx=enc.__domain[1]; } // v4 E4: 그룹 공통 y-domain
  if(enc.zero_baseline) mn=Math.min(0,mn); if(mx===mn) mx=mn+1; const pad=(mx-mn)*0.1; mn-=pad; mx+=pad;
  const X=i=>M.l+(xs.length>1? PW*i/(xs.length-1):PW/2), Y=v=>M.t+PH-PH*(v-mn)/(mx-mn);
  let s=svgOpen()+axes()+yticks(mn,mx);
  // 0 기준선 (음수 교차 시) — YoY 증감률 등
  if(mn<0 && mx>0){ const zy=Y(0); s+=`<line x1="${M.l}" y1="${zy}" x2="${M.l+PW}" y2="${zy}" stroke="${rc('axis')}" stroke-width="1" stroke-dasharray="3,3"/>`; }
  series.forEach((ser,si)=>{
    const vals=ser.values, col=rc(ser.role||`cat${(si%8)+1}`)||rc("info");
    let segs=[],cur=[];
    vals.forEach((v,i)=>{ if(v===null){ if(cur.length)segs.push(cur); cur=[]; } else cur.push([X(i),Y(v),i]); });
    if(cur.length)segs.push(cur);
    segs.forEach(seg=>{
      if(asArea && seg.length>1){
        const base=Y(Math.max(0,mn));
        const pts=seg.map(p=>p[0]+','+p[1]).join(' ');
        const poly=`${seg[0][0]},${base} ${pts} ${seg[seg.length-1][0]},${base}`;
        s+=`<polygon points="${poly}" fill="${col}" fill-opacity="0.14"/>`;
      }
      s+=`<polyline points="${seg.map(p=>p[0]+','+p[1]).join(' ')}" fill="none" stroke="${col}" stroke-width="${si===0?2.2:1.8}"/>`;
    });
    // 밀집(>30점)이면 마커 생략
    if(xs.length<=30) vals.forEach((v,i)=>{ if(v!==null) s+=`<circle cx="${X(i)}" cy="${Y(v)}" r="2.4" fill="${col}"/>`; });
  });
  // x 라벨 솎기 (최대 ~7개)
  const step=Math.max(1, Math.ceil(xs.length/7));
  xs.forEach((x,i)=>{ if(i%step===0 || i===xs.length-1) s+=`<text x="${X(i)}" y="${M.t+PH+15}" text-anchor="middle" font-size="9" fill="${rc('muted')}">${labelText(x,10)}</text>`; });
  return s+"</svg>";
}
function renderHorizontalBar(enc){
  const xs=enc.x.values, ser=enc.series[0], vals=ser.values;
  let mx=Math.max(...vals.map(v=>v||0)); if(mx===0)mx=1;
  const m={l:112,r:24,t:14,b:20}, pw=W-m.l-m.r, ph=H-m.t-m.b;
  const row=ph/xs.length, bh=Math.min(row*0.62,14), X=v=>m.l+pw*v/mx;
  let s=svgOpen()+
    `<line x1="${m.l}" y1="${m.t}" x2="${m.l}" y2="${m.t+ph}" stroke="${rc('axis')}" stroke-width="1"/>`+
    `<line x1="${m.l}" y1="${m.t+ph}" x2="${m.l+pw}" y2="${m.t+ph}" stroke="${rc('axis')}" stroke-width="1"/>`;
  for(let i=0;i<=3;i++){ const v=mx*i/3, x=m.l+pw*i/3;
    s+=`<line x1="${x}" y1="${m.t}" x2="${x}" y2="${m.t+ph}" stroke="${rc('grid')}" stroke-width="1"/>`+
       `<text x="${x}" y="${m.t+ph+14}" text-anchor="middle" font-size="8" fill="${rc('muted')}">${trim(v)}</text>`;
  }
  xs.forEach((x,i)=>{
    const v=vals[i]||0, y=m.t+row*i+row/2, w=Math.max(1,X(v)-m.l);
    s+=`<text x="${m.l-7}" y="${y+3}" text-anchor="end" font-size="8.5" fill="${rc('muted')}">${labelText(x,13)}</text>`+
       `<rect x="${m.l}" y="${y-bh/2}" width="${w}" height="${bh}" rx="2" fill="${rc(ser.role||'info')}"/>`;
  });
  return s+"</svg>";
}
function renderBar(enc){
  const xs=enc.x.values, ser=enc.series, n=ser.length;
  if(n===1 && denseLabels(xs) && !enc.__domain) return renderHorizontalBar(enc);
  let mx=0; xs.forEach((_,i)=>ser.forEach(s=>mx=Math.max(mx,s.values[i]||0))); if(mx===0)mx=1;
  if(enc.__domain) mx=Math.max(enc.__domain[1],1); // v4 E4: 그룹 공통 y-domain (막대는 0 기준)
  const gw=PW/xs.length, bw=Math.min(gw*0.7/n, 46/n);
  const Y=v=>M.t+PH-PH*v/mx;
  let s=svgOpen()+axes()+yticks(0,mx);
  const step=labelStep(xs,6);
  xs.forEach((x,i)=>{ const gx=M.l+gw*i+gw/2; ser.forEach((se,j)=>{ const v=se.values[i]||0;
      const bx=gx-(n*bw)/2+j*bw; s+=`<rect x="${bx}" y="${Y(v)}" width="${bw*0.86}" height="${M.t+PH-Y(v)}" rx="2" fill="${rc(se.role||'info')}"/>`; });
    if(i%step===0) s+=`<text x="${gx}" y="${M.t+PH+15}" text-anchor="middle" font-size="9" fill="${rc('muted')}">${labelText(x,8)}</text>`; });
  return s+"</svg>";
}
function renderStacked(enc, pct){
  const xs=enc.x.values, ser=enc.series;
  let tot=xs.map((_,i)=>ser.reduce((a,s)=>a+(s.values[i]||0),0)); let mx=pct?100:Math.max(...tot); if(mx===0)mx=1;
  const gw=PW/xs.length, bw=Math.min(gw*0.55,40); const Y=v=>M.t+PH-PH*v/mx;
  let s=svgOpen()+axes()+yticks(0,mx);
  const step=labelStep(xs,5);
  xs.forEach((x,i)=>{ const gx=M.l+gw*i+gw/2; let acc=0;
    ser.forEach(se=>{ let v=se.values[i]||0; if(pct) v=tot[i]===0?0:v/tot[i]*100; const y0=Y(acc), y1=Y(acc+v);
      s+=`<rect x="${gx-bw/2}" y="${y1}" width="${bw}" height="${y0-y1}" fill="${rc(se.role||'info')}"/>`; acc+=v; });
    if(i%step===0) s+=`<text x="${gx}" y="${M.t+PH+15}" text-anchor="middle" font-size="9" fill="${rc('muted')}">${labelText(x,8)}</text>`; });
  return s+"</svg>";
}
function renderHistogram(enc){
  const bins=enc.bins; let mx=Math.max(...bins.map(b=>b.count)); if(mx===0)mx=1;
  const bw=PW/bins.length, Y=c=>M.t+PH-PH*c/mx;
  let s=svgOpen()+axes()+yticks(0,mx);
  bins.forEach((b,i)=>{ const x=M.l+bw*i; s+=`<rect x="${x+1}" y="${Y(b.count)}" width="${bw-2}" height="${M.t+PH-Y(b.count)}" fill="${rc('info')}"/>`;
    s+=`<text x="${x+bw/2}" y="${M.t+PH+15}" text-anchor="middle" font-size="8" fill="${rc('muted')}">${labelText(b.range[0],8)}</text>`; });
  return s+"</svg>";
}
function renderScatter(enc){
  const pts=enc.points; const xsv=pts.map(p=>p.x), ysv=pts.map(p=>p.y);
  let xmn=Math.min(...xsv),xmx=Math.max(...xsv),ymn=Math.min(...ysv),ymx=Math.max(...ysv);
  const xp=(xmx-xmn)*0.1||1, yp=(ymx-ymn)*0.1||1; xmn-=xp;xmx+=xp;ymn-=yp;ymx+=yp;
  const X=v=>M.l+PW*(v-xmn)/(xmx-xmn), Y=v=>M.t+PH-PH*(v-ymn)/(ymx-ymn);
  let s=svgOpen()+axes()+yticks(ymn,ymx);
  pts.forEach(p=>{ s+=`<circle cx="${X(p.x)}" cy="${Y(p.y)}" r="4" fill="${rc(p.role||'info')}" fill-opacity="0.8"/>`; });
  return s+"</svg>";
}
function renderHeatmap(enc){
  const xs=enc.x.values, ys=enc.y.values, vals=enc.cells.map(c=>c.value).filter(v=>v!==null);
  let mn=Math.min(...vals), mx=Math.max(...vals); if(mx===mn) mx=mn+1;
  const cw=PW/xs.length, ch=PH/ys.length;
  const xi=new Map(xs.map((x,i)=>[String(x),i])), yi=new Map(ys.map((y,i)=>[String(y),i]));
  const alpha=v=>0.16+0.72*(v-mn)/(mx-mn);
  let s=svgOpen()+axes();
  enc.cells.forEach(c=>{
    if(c.value===null)return;
    const i=xi.get(String(c.x)), j=yi.get(String(c.y)); if(i==null||j==null)return;
    const x=M.l+i*cw, y=M.t+j*ch;
    s+=`<rect x="${x+1}" y="${y+1}" width="${cw-2}" height="${ch-2}" rx="2" fill="${rc(c.role||'info')}" fill-opacity="${alpha(c.value)}"/>`;
  });
  const xstep=Math.max(1,Math.ceil(xs.length/6)), ystep=Math.max(1,Math.ceil(ys.length/6));
  xs.forEach((x,i)=>{ if(i%xstep===0) s+=`<text x="${M.l+i*cw+cw/2}" y="${M.t+PH+15}" text-anchor="middle" font-size="8" fill="${rc('muted')}">${labelText(x,8)}</text>`; });
  ys.forEach((y,j)=>{ if(j%ystep===0) s+=`<text x="${M.l-6}" y="${M.t+j*ch+ch/2+3}" text-anchor="end" font-size="8" fill="${rc('muted')}">${labelText(y,8)}</text>`; });
  return s+"</svg>";
}
function renderBoxplot(enc){
  const boxes=enc.boxes, nums=boxes.flatMap(b=>[b.min,b.q1,b.median,b.q3,b.max].concat(b.outliers||[]));
  let mn=Math.min(...nums), mx=Math.max(...nums); if(mx===mn)mx=mn+1; const pad=(mx-mn)*0.08; mn-=pad; mx+=pad;
  const gw=PW/boxes.length, bw=Math.min(gw*0.46,34), Y=v=>M.t+PH-PH*(v-mn)/(mx-mn);
  let s=svgOpen()+axes()+yticks(mn,mx);
  boxes.forEach((b,i)=>{ const x=M.l+gw*i+gw/2, col=rc(b.role||`cat${(i%8)+1}`);
    s+=`<line x1="${x}" y1="${Y(b.min)}" x2="${x}" y2="${Y(b.max)}" stroke="${col}" stroke-width="1.4"/>`;
    s+=`<line x1="${x-bw/3}" y1="${Y(b.min)}" x2="${x+bw/3}" y2="${Y(b.min)}" stroke="${col}" stroke-width="1.4"/>`;
    s+=`<line x1="${x-bw/3}" y1="${Y(b.max)}" x2="${x+bw/3}" y2="${Y(b.max)}" stroke="${col}" stroke-width="1.4"/>`;
    s+=`<rect x="${x-bw/2}" y="${Y(b.q3)}" width="${bw}" height="${Math.max(1,Y(b.q1)-Y(b.q3))}" fill="${col}" fill-opacity="0.18" stroke="${col}" stroke-width="1.4"/>`;
    s+=`<line x1="${x-bw/2}" y1="${Y(b.median)}" x2="${x+bw/2}" y2="${Y(b.median)}" stroke="${rc('ink')}" stroke-width="1.5"/>`;
    (b.outliers||[]).forEach(o=>s+=`<circle cx="${x}" cy="${Y(o)}" r="2" fill="${col}" fill-opacity="0.65"/>`);
    s+=`<text x="${x}" y="${M.t+PH+15}" text-anchor="middle" font-size="8" fill="${rc('muted')}">${labelText(b.label,8)}</text>`;
  });
  return s+"</svg>";
}
function renderWaterfall(enc){
  const steps=enc.steps; let acc=0, lows=[], highs=[];
  steps.forEach((st,i)=>{ const start=(i===0||st.kind==="start")?0:acc; const end=st.kind==="total"?st.value:(st.kind==="start"?st.value:acc+st.value); lows.push(Math.min(start,end)); highs.push(Math.max(start,end)); acc=end; });
  let mn=Math.min(0,...lows), mx=Math.max(...highs); if(mx===mn)mx=mn+1; const pad=(mx-mn)*0.08; mn-=pad; mx+=pad;
  const gw=PW/steps.length, bw=Math.min(gw*0.52,36), Y=v=>M.t+PH-PH*(v-mn)/(mx-mn);
  let s=svgOpen()+axes()+yticks(mn,mx); acc=0;
  steps.forEach((st,i)=>{ const x=M.l+gw*i+gw/2; let start=(i===0||st.kind==="start")?0:acc; let end=st.kind==="total"?st.value:(st.kind==="start"?st.value:acc+st.value); const y=Math.min(Y(start),Y(end)), h=Math.max(1,Math.abs(Y(start)-Y(end)));
    const role=st.role||(st.kind==="increase"?"good":st.kind==="decrease"?"bad":"info");
    s+=`<rect x="${x-bw/2}" y="${y}" width="${bw}" height="${h}" rx="2" fill="${rc(role)}"/>`;
    if(i>0) s+=`<line x1="${M.l+gw*(i-1)+gw/2+bw/2}" y1="${Y(start)}" x2="${x-bw/2}" y2="${Y(start)}" stroke="${rc('axis')}" stroke-dasharray="2,2"/>`;
    s+=`<text x="${x}" y="${M.t+PH+15}" text-anchor="middle" font-size="8" fill="${rc('muted')}">${labelText(st.label,8)}</text>`; acc=end;
  });
  return s+"</svg>";
}
function renderSlope(enc){
  const ser=enc.series, vals=ser.flatMap(s=>[s.start,s.end]);
  let mn=Math.min(...vals), mx=Math.max(...vals); if(mx===mn)mx=mn+1; const pad=(mx-mn)*0.08; mn-=pad; mx+=pad;
  const X0=M.l+36, X1=M.l+PW-36, Y=v=>M.t+PH-PH*(v-mn)/(mx-mn);
  let s=svgOpen()+axes()+yticks(mn,mx);
  s+=`<text x="${X0}" y="${M.t+PH+15}" text-anchor="middle" font-size="9" fill="${rc('muted')}">${labelText(enc.x.start_label,10)}</text>`;
  s+=`<text x="${X1}" y="${M.t+PH+15}" text-anchor="middle" font-size="9" fill="${rc('muted')}">${labelText(enc.x.end_label,10)}</text>`;
  ser.forEach((p,i)=>{ const col=rc(p.role||`cat${(i%8)+1}`), y0=Y(p.start), y1=Y(p.end);
    s+=`<line x1="${X0}" y1="${y0}" x2="${X1}" y2="${y1}" stroke="${col}" stroke-width="1.8"/>`;
    s+=`<circle cx="${X0}" cy="${y0}" r="2.8" fill="${col}"/><circle cx="${X1}" cy="${y1}" r="2.8" fill="${col}"/>`;
    if(i<8) s+=`<text x="${X1+6}" y="${y1+3}" font-size="8" fill="${rc('muted')}">${labelText(p.label,10)}</text>`;
  });
  return s+"</svg>";
}
function chartSVG(ch){ const t=ch.type, e=ch.encoding;
  if(t==="line")return renderLine(e); if(t==="area")return renderLine(e,true); if(t==="bar")return renderBar(e);
  if(t==="stacked_bar")return renderStacked(e, e.stack==="stacked_100");
  if(t==="histogram")return renderHistogram(e); if(t==="scatter")return renderScatter(e);
  if(t==="heatmap")return renderHeatmap(e); if(t==="boxplot")return renderBoxplot(e);
  if(t==="waterfall")return renderWaterfall(e); if(t==="slope")return renderSlope(e); return ""; }
function legend(ch){ if(!ch.encoding.series||ch.encoding.series.length<2||ch.type==="slope")return "";
  return `<div class="legend">`+ch.encoding.series.map(s=>`<span><i style="background:${rc(s.role||'info')}"></i>${s.label}</span>`).join("")+`</div>`; }

/* ───── 패널/요소 렌더 ───── */
function kpiDeltaColor(k){ // v4 E1 색 룰(spec §3): good/bad만 상태 2색, warn·neutral은 muted — 세 번째 상태색 금지
  return k.status==="good"?rc("good"):k.status==="bad"?rc("bad"):rc("muted"); }
function kpiDelta(k){ const c=k.comparison; if(!c) return "";
  const sym=c.direction==="down"?"▼":c.direction==="up"?"▲":"—";
  if(c.kind==="period_delta"){
    return `<div class="kpi-d kpi-delta-v4" style="color:${kpiDeltaColor(k)}">${sym} ${Math.abs(c.delta)} ${k.unit} <span class="kpi-basis">(${c.basis})</span></div>`;
  }
  // kind 없음/benchmark: 기존 run 의미 보존 — 현행 렌더 유지 (v4 spec §4.1)
  return `<div class="kpi-d" style="color:${rc(k.status)}">${sym} ${Math.abs(c.delta)}${k.unit} (${c.basis})</div>`; }
function kpiSpark(k){ const t=k.trend;
  if(!t||!Array.isArray(t.points)||t.points.length<4) return "";
  const pts=t.points, W=140, H=40, pad=3;
  const mn=Math.min(...pts), mx=Math.max(...pts), span=(mx-mn)||1;
  const step=(W-2*pad)/(pts.length-1);
  const coords=pts.map((v,i)=>`${(pad+i*step).toFixed(1)},${(H-pad-((v-mn)/span)*(H-2*pad)).toFixed(1)}`).join(" ");
  return `<div class="kpi-spark"><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${t.period_label||"추세"}">`+
    `<polyline fill="none" stroke="var(--soft)" stroke-width="1.5" points="${coords}"/></svg>`+
    (t.period_label?`<div class="kpi-spark-l">${t.period_label}</div>`:"")+`</div>`; }
function kpiCard(k){
  const badge = (DATA.assertions||[]).some(a=>a.rule==="sample_min"&&a.target===k.id&&DATA.meta.row_count<a.min)? `<span class="badge">표본주의</span>`:"";
  return `<div class="kpi"><div class="kpi-l">${k.label}${badge}</div>`+
    `<div class="kpi-v">${fmt(k.value,k.format)}<span class="kpi-u">${k.unit}</span></div>`+
    kpiDelta(k)+kpiSpark(k)+
    (k.denominator? `<div class="kpi-den">${k.denominator}</div>`:"")+`</div>`; }

function story(st){ if(!st)return ""; const cells=[["현황",st.now],["원인",st.why],["결과",st.so],["대응",st.act]];
  return `<div class="story">`+cells.map(([l,c])=>`<div class="sf"><div class="sf-l">${l}</div><div class="sf-v">${c.value}</div><div class="sf-d">${c.desc}</div></div>`).join("")+`</div>`; }

// v4 E4: 같은 panel 안에서 small_multiple_group으로 묶인 차트를 공통 y-domain 그리드로 렌더
function smallMultipleGrid(groupId, chs){
  let mn=Infinity, mx=-Infinity;
  chs.forEach(ch=>((ch.encoding||{}).series||[]).forEach(se=>(se.values||[]).forEach(v=>{
    if(v!==null&&isFinite(v)){ mn=Math.min(mn,v); mx=Math.max(mx,v); } })));
  if(!isFinite(mn)){ mn=0; mx=1; }
  chs.forEach(ch=>{ ch.encoding.__domain=[mn,mx]; });
  return `<div class="sm-grid" data-group="${groupId}">`+chs.map(ch=>card(ch,"sm-card")).join("")+`</div>`;
}
function splitMultiples(charts){ const groups={}, solo=[];
  (charts||[]).forEach(ch=>{ const g=ch.small_multiple_group;
    if(g){ (groups[g]=groups[g]||[]).push(ch); } else solo.push(ch); });
  return [groups, solo]; }
function chartsBlock(charts, variant=""){ if(!charts||!charts.length)return "";
  const [groups, solo]=splitMultiples(charts);
  const groupHtml=Object.entries(groups).map(([g,chs])=>smallMultipleGrid(g,chs)).join("");
  if(variant==="analyst"){
  return (solo.length?`<div class="analyst-grid">`+solo.map(ch=>card(ch)).join("")+`</div>`:"")+groupHtml;
}
  if(!solo.length) return groupHtml;
  const n=solo.length; let cls = n>=3?"row-3": n===2?"row-2a":"row-1";
  const extra = variant==="secondary"?" secondary": variant==="ops-trend"?" ops-trend":"";
  // 비대칭: 5개면 첫 행 2개(1.5:1) + 둘째 행 3개
  if(n===5){ return `<div class="charts row-2a${extra}">`+solo.slice(0,2).map(card).join("")+`</div>`+
                    `<div class="charts row-3${extra}">`+solo.slice(2).map(card).join("")+`</div>`+groupHtml; }
  return `<div class="charts ${cls}${extra}">`+solo.map(card).join("")+`</div>`+groupHtml; }
function card(ch, extraClass=""){ const typeClass=`chart-type-${String(ch.type||"unknown").replace(/[^a-z0-9_-]/gi,"_")}`;
  // chart-card: 렌더 QA가 차트 SVG만 세는 selector — KPI 스파크(v4 E1) SVG와 구분
  return `<div class="card chart-card ${typeClass}${extraClass?` ${extraClass}`:""}"><div class="cc-t">${ch.title}</div>`+
  (ch.desc?`<div class="cc-d">${ch.desc}</div>`:"")+chartSVG(ch)+legend(ch)+`</div>`; }

function simBlock(sims){ if(!sims||!sims.length)return ""; return sims.map(sm=>{
  const rows=sm.inputs.map(inp=>`<div class="sim-row"><label>${inp.label}${inp.unit?` (${inp.unit})`:""}</label>`+
    `<input type="range" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.default}" data-sim="${sm.id}" data-input="${inp.id}" oninput="onSim('${sm.id}')">`+
    `<span class="sim-iv" id="iv-${sm.id}-${inp.id}">${inp.default}</span></div>`).join("");
  return `<div class="sim"><div class="sim-t">${sm.title}</div>${rows}`+
    `<div class="sim-out">${sm.output.label}<b id="${sm.output.id}">—</b> <span style="font-size:13px;color:var(--soft)">${sm.output.unit}</span></div></div>`;
}).join(""); }
function onSim(id){ const sm=findSim(id); const vals={};
  sm.inputs.forEach(inp=>{ const el=document.querySelector(`[data-sim="${id}"][data-input="${inp.id}"]`); vals[inp.id]=parseFloat(el.value);
    document.getElementById(`iv-${id}-${inp.id}`).textContent=el.value; });
  const out=computeModel(sm.model, sm.inputs, vals);
  document.getElementById(sm.output.id).textContent = isNaN(out)?"범위 밖":out; }
function findSim(id){ for(const p of DATA.panels) for(const s of (p.simulators||[])) if(s.id===id) return s; }

function actions(a){ if(!a||!a.length)return ""; return `<div class="actions">`+a.map(x=>`<div class="act"><div class="act-p">${x.priority}</div><div class="act-t">${x.title}</div><div class="act-w">${x.why}${x.metric?` · ${x.metric}`:""}</div></div>`).join("")+`</div>`; }
// v4 E5: 셀 그라데이션 — 무채색 보간만 (밀도 표현, 상태색 재사용 금지). min==max는 동일 중립색.
function gradientRanges(t){
  const grad=t.cell_gradient; if(!grad||!Array.isArray(grad.value_column_indices)) return null;
  const rows=t.rows.slice(0,t.row_limit); // scale 계산 기준: 렌더되는 rows[:row_limit]
  const ranges={};
  const collect=(idxs)=>{ let mn=Infinity,mx=-Infinity;
    rows.forEach(r=>idxs.forEach(ci=>{ const v=r[ci];
      if(typeof v==="number"&&isFinite(v)){ mn=Math.min(mn,v); mx=Math.max(mx,v); } }));
    return isFinite(mn)?[mn,mx]:null; };
  if(grad.scale==="table"){ const range=collect(grad.value_column_indices);
    grad.value_column_indices.forEach(ci=>ranges[ci]=range); }
  else grad.value_column_indices.forEach(ci=>{ ranges[ci]=collect([ci]); });
  return ranges;
}
function gradientStyle(v, range){
  if(typeof v!=="number"||!isFinite(v)||!range) return ""; // null/비숫자: 배경 없음
  const [mn,mx]=range;
  if(mx===mn) return ` class="grad-cell" style="background:hsl(0 0% 88%)"`;
  const t=(v-mn)/(mx-mn), l=94-46*t; // 무채색: 94%(옅음)→48%(진함)
  return ` class="grad-cell" style="background:hsl(0 0% ${l.toFixed(1)}%);color:${l<64?"#fff":"var(--ink)"}"`;
}
function tableBlock(t){ if(!t)return ""; const head=t.columns.map(c=>`<th>${c.name}${c.unit?` (${c.unit})`:""}</th>`).join("");
  const ranges=gradientRanges(t);
  const body=t.rows.slice(0,t.row_limit).map(r=>`<tr>${r.map((v,ci)=>{
    const style=ranges&&ranges[ci]!==undefined? gradientStyle(v,ranges[ci]):"";
    return `<td${style}>${v===null?"—":v}</td>`; }).join("")}</tr>`).join("");
  return `<table class="dt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`; }

function panelHeader(p){ return `<div class="ptitle">${p.title}</div>`+(p.method?`<div class="pmethod">${p.method}</div>`:""); }
function kpisBlock(i){ return i===ACTIVE&&DATA.kpis?`<div class="kpis">${DATA.kpis.map(kpiCard).join("")}</div>`:""; }
function isTrendChart(ch){ const x=((ch.encoding||{}).x||{}); return ["line","area","slope"].includes(ch.type)||x.type==="time"; }
function splitCharts(charts, predicate){ const yes=[], no=[]; (charts||[]).forEach(ch=>(predicate(ch)?yes:no).push(ch)); return [yes,no]; }
function metaLine(){
  const m=DATA.meta||{};
  const parts=[m.domain, m.period||"", m.row_count!=null?`${m.row_count}건`:""];
  const audience=AUDIENCE_LABELS[m.audience]||"";
  if(audience) parts.push(audience);
  return parts.filter(Boolean).join(" · ");
}

function renderExecutivePanel(p,i){
  const charts=p.charts||[];
  const main=charts[0];
  const support=charts.slice(1,3);
  const rest=charts.slice(3);
  const side=[story(p.story), ...support.map(ch=>card(ch,"support-card"))].filter(Boolean).join("");
  return panelHeader(p)+kpisBlock(i)+
    (main?`<div class="exec-hero"><div class="exec-main">${card(main,"main-card")}</div>${side?`<div class="exec-side">${side}</div>`:""}</div>`:"")+
    chartsBlock(rest,"secondary")+simBlock(p.simulators)+actions(p.actions)+tableBlock(p.table);
}

function renderAnalystPanel(p,i){
  return panelHeader(p)+story(p.story)+kpisBlock(i)+chartsBlock(p.charts||[],"analyst")+
    simBlock(p.simulators)+tableBlock(p.table)+actions(p.actions);
}

function renderOperationsPanel(p,i){
  const charts=p.charts||[];
  // v4 E4: 그룹 차트는 lead/rest 분배에서 제외하고 그리드로 묶어 렌더
  const grouped=charts.filter(ch=>ch.small_multiple_group);
  const ungrouped=charts.filter(ch=>!ch.small_multiple_group);
  const split=splitCharts(ungrouped,isTrendChart);
  const lead=split[0].length?split[0].slice(0,2):ungrouped.slice(0,2);
  const leadIds=new Set(lead.map(ch=>ch.id));
  const rest=ungrouped.filter(ch=>!leadIds.has(ch.id));
  return panelHeader(p)+`<div class="ops-layout"><div class="ops-status-stack">`+
    kpisBlock(i)+story(p.story)+actions(p.actions)+`</div><div class="ops-trend-stack">`+
    chartsBlock(lead,"ops-trend")+chartsBlock(rest,"secondary")+chartsBlock(grouped)+simBlock(p.simulators)+
    `</div></div>`+tableBlock(p.table);
}

function renderPanel(profile,p,i){
  if(profile==="analyst_workspace") return renderAnalystPanel(p,i);
  if(profile==="operations_monitor") return renderOperationsPanel(p,i);
  return renderExecutivePanel(p,i);
}

let ACTIVE=0;
function contractV4(){ return !!(DATA.meta&&DATA.meta.dashboard_profile_contract==="v4"); }
function panelSurface(p){ return p.surface||"primary"; }
function initSimulators(){ DATA.panels.forEach(p=>(p.simulators||[]).forEach(s=>onSim(s.id))); }
// v4 E2: analyst 단일 스크롤 — primary 패널을 한 화면에 쌓고 detail/appendix는 접힘으로 강등
function renderAnalystSingleScroll(profile){
  document.getElementById("d-tabs").innerHTML="";
  const primary=DATA.panels.filter(p=>panelSurface(p)==="primary");
  const demoted=DATA.panels.filter(p=>panelSurface(p)!=="primary");
  document.getElementById("d-panels").innerHTML=
    `<div class="v4-scroll" data-layout="${profile}">`+
    primary.map((p,i)=>`<section class="panel active v4-primary">`+renderAnalystPanel(p,i===0?ACTIVE:-1)+`</section>`).join("")+
    demoted.map(p=>`<details class="v4-demoted"><summary>${p.title}</summary><div class="panel active">`+renderAnalystPanel(p,-1)+`</div></details>`).join("")+
    `</div>`;
}
// v4 E3: operations 레일 — 기존 ACTIVE 패널 switcher의 레일 UI 재표현 (패널 제목 파생, 브랜드 비의존)
function renderOperationsRail(profile){
  document.getElementById("d-tabs").innerHTML="";
  document.getElementById("d-panels").innerHTML=
    `<div class="v4-ops" data-layout="${profile}">`+
    `<nav class="v4-rail">`+DATA.panels.map((p,i)=>`<div class="rail-item ${i===ACTIVE?"active":""}" onclick="setTab(${i})">${p.title}</div>`).join("")+`</nav>`+
    `<div class="v4-ops-body">`+DATA.panels.map((p,i)=>`<div class="panel ${i===ACTIVE?"active":""}" data-layout="${profile}">`+renderOperationsPanel(p,i)+`</div>`).join("")+`</div>`+
    `</div>`;
}
function render(){
  const profile=dashboardProfile();
  document.body.classList.toggle("v4-contract", contractV4());
  document.getElementById("d-title").textContent=DATA.meta.title;
  document.getElementById("d-meta").textContent=metaLine();
  if(contractV4()&&profile==="analyst_workspace"){ renderAnalystSingleScroll(profile); initSimulators(); return; }
  if(contractV4()&&profile==="operations_monitor"){ renderOperationsRail(profile); initSimulators(); return; }
  document.getElementById("d-tabs").innerHTML=DATA.panels.map((p,i)=>`<div class="tab ${i===ACTIVE?"active":""}" onclick="setTab(${i})">${p.title}</div>`).join("");
  document.getElementById("d-panels").innerHTML=DATA.panels.map((p,i)=>{
    return `<div class="panel ${i===ACTIVE?"active":""}" data-layout="${profile}">`+renderPanel(profile,p,i)+`</div>`;
  }).join("");
  initSimulators();
}
function setTab(i){ ACTIVE=i; render(); }
applyTheme("light");
</script>
</body>
</html>
